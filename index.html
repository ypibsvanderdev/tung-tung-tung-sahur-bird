<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNG TUNG SAHUR BIRD | Elite Ramadan Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --accent: #f1c40f; /* Crescent Gold */
            --night-purple: #2b1055;
            --soft-white: #f0f0f0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #2b1055 100%);
            color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        canvas {
            background: rgba(10, 10, 26, 0.4);
            border-radius: 40px; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border: 2px solid rgba(241, 196, 15, 0.1);
        }

        /* --- RAMADAN UI OVERLAY --- */
        #ui-layer {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(241, 196, 15, 0.2);
            padding: 50px; border-radius: 40px;
            text-align: center; pointer-events: auto;
            animation: moonRise 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            max-width: 400px; width: 90%;
        }

        @keyframes moonRise { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            font-family: 'Bebas Neue', cursive; font-weight: 400; 
            letter-spacing: 10px; font-size: 4rem; margin: 0; 
            color: var(--accent); text-shadow: 0 0 30px rgba(241, 196, 15, 0.5); 
        }
        
        #subtitle { color: rgba(255,255,255,0.6); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; margin-top: -10px; }

        .btn-start {
            margin-top: 40px;
            padding: 20px 60px; border: none; border-radius: 100px;
            background: var(--accent); color: #000;
            font-weight: 900; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: 0.4s; text-transform: uppercase;
            letter-spacing: 2px; font-size: 1rem;
        }

        .btn-start:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(241, 196, 15, 0.4); }

        #score-display {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 5rem;
            color: #fff; text-shadow: 0 10px 40px rgba(0,0,0,0.5);
            opacity: 0; transition: 0.5s;
        }

        /* --- TUNG TUNG HUD --- */
        #drum-meter {
            position: absolute; bottom: 40px; right: 40px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }

        .drum-pulse {
            height: 4px; width: 40px; background: var(--accent); border-radius: 100px;
            opacity: 0.2; transition: 0.3s;
        }

        .drum-pulse.active { opacity: 1; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="score-display">0</div>
        
        <div id="ui-layer">
            <div id="main-menu" class="menu-card">
                <h1>SAHUR</h1>
                <div id="subtitle">TUNG TUNG TUNG EDITION</div>
                
                <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.6;">WAKE UP THE NEIGHBORHOOD WITH YOUR DRUMS</p>

                <button class="btn-start" onclick="startGame()">Wake Up</button>
            </div>
        </div>

        <div id="drum-meter">
            <div class="drum-pulse"></div>
            <div class="drum-pulse"></div>
            <div class="drum-pulse"></div>
        </div>
    </div>

    <!-- AUDIO FOR SAHUR DRUMS -->
    <audio id="tung-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-tribal-drum-strike-543.mp3" preload="auto"></audio>

    <script src="scripts/game.js"></script>
</body>
</html>
